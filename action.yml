name: "AI PR Reviewer"
description: "Automatically review pull requests using AI"

inputs:
  openai_api_key:
    description: "OpenAI API Key"
    required: true

runs:
  using: "composite"
  steps:
    - run: pip install openai
      shell: bash

    - run: python review.py
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}